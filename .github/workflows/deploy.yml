name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd ~/ai-assistant
            echo "=== Pulling latest code ==="
            git stash
            git pull origin main

            echo "=== Checking SSL cert for aia.rikreay24.com ==="
            if [ ! -d "./nginx/ssl/live/aia.rikreay24.com" ]; then
              echo "SSL cert not found, attempting to issue..."
              # Start only nginx for ACME challenge
              docker compose -f docker-compose.prod.yml up -d nginx 2>/dev/null || true
              sleep 3
              docker compose -f docker-compose.prod.yml run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d aia.rikreay24.com \
                --email mvsotso@gmail.com --agree-tos --no-eff-email \
                && echo " ✓ SSL cert issued for aia.rikreay24.com" \
                || echo " ⚠ SSL cert failed (DNS may not be ready yet, duckdns will still work)"
            else
              echo " ✓ SSL cert already exists for aia.rikreay24.com"
            fi

            echo "=== Building and deploying ==="
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Waiting 30s for startup ==="
            sleep 30

            echo "=== Container status ==="
            docker ps -a --filter "name=ai-assistant" --format "table {{.Names}}	{{.Status}}" || true

            echo "=== App container logs (last 100 lines) ==="
            docker logs ai-assistant --tail 100 2>&1 || true

            echo "=== Health check ==="
            curl -sf http://localhost:8000/api/v1/health && echo " Health check passed" || echo " Health check failed"

            echo "=== Deploy complete ==="
