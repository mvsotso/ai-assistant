<script>
// ═══════════════════════════════════════════════════════════
// TASK GROUPS — State & Logic
// ═══════════════════════════════════════════════════════════

let taskGroups = [];           // All groups with subgroups
let ungroupedCount = 0;
let activeGroupId = 'all';     // 'all', 'ungrouped', or numeric group ID
let activeSubGroupId = 'all';  // 'all' or numeric subgroup ID
let activeStatusFilter = 'all';
let allTasks = [];             // Full task list from API


// ── Load Groups ──
async function loadTaskGroups() {
  try {
    const res = await fetch('/api/v1/task-groups', {
      headers: { 'Authorization': `Bearer ${sessionToken}` }
    });
    if (!res.ok) throw new Error('Failed to load groups');
    const data = await res.json();
    taskGroups = data.groups || [];
    ungroupedCount = data.ungrouped_count || 0;
    renderGroupTabs();
  } catch (err) {
    console.error('loadTaskGroups error:', err);
  }
}


// ── Render Group Tabs ──
function renderGroupTabs() {
  const container = document.getElementById('group-tabs');
  const totalCount = allTasks.length;

  let html = `
    <button class="group-tab ${activeGroupId === 'all' ? 'active' : ''}" 
            data-group-id="all" onclick="selectGroupTab('all')"
            style="--tab-color: #3b82f6">
      <span class="tab-icon">📋</span>
      <span class="tab-label">All Tasks</span>
      <span class="tab-count">${totalCount}</span>
    </button>
    <button class="group-tab ${activeGroupId === 'ungrouped' ? 'active' : ''}" 
            data-group-id="ungrouped" onclick="selectGroupTab('ungrouped')"
            style="--tab-color: #64748b">
      <span class="tab-icon">📥</span>
      <span class="tab-label">Ungrouped</span>
      <span class="tab-count">${ungroupedCount}</span>
    </button>
  `;

  for (const g of taskGroups) {
    const isActive = activeGroupId == g.id;
    html += `
      <button class="group-tab ${isActive ? 'active' : ''}" 
              data-group-id="${g.id}" onclick="selectGroupTab(${g.id})"
              style="--tab-color: ${g.color || '#3b82f6'}">
        <span class="tab-icon">${g.icon || '📁'}</span>
        <span class="tab-label">${escapeHtml(g.name)}</span>
        <span class="tab-count">${g.task_count || 0}</span>
      </button>
    `;
  }

  container.innerHTML = html;
  renderSubGroupFilters();
}


// ── Select Group Tab ──
function selectGroupTab(groupId) {
  activeGroupId = groupId;
  activeSubGroupId = 'all';
  renderGroupTabs();
  renderFilteredTasks();
}


// ── Render SubGroup Filter Chips ──
function renderSubGroupFilters() {
  const container = document.getElementById('subgroup-filters');

  if (activeGroupId === 'all' || activeGroupId === 'ungrouped') {
    container.style.display = 'none';
    return;
  }

  const group = taskGroups.find(g => g.id == activeGroupId);
  if (!group || !group.subgroups || group.subgroups.length === 0) {
    // Show just the "+" button if group has no subgroups yet
    container.style.display = 'flex';
    container.innerHTML = `
      <button class="subgroup-chip active" data-subgroup-id="all" onclick="selectSubGroup('all')">All</button>
      <button class="subgroup-chip add-subgroup-btn" onclick="openAddSubGroup()" title="Add sub-group">+</button>
    `;
    return;
  }

  container.style.display = 'flex';
  let html = `
    <button class="subgroup-chip ${activeSubGroupId === 'all' ? 'active' : ''}" 
            data-subgroup-id="all" onclick="selectSubGroup('all')">All</button>
  `;

  for (const sg of group.subgroups) {
    html += `
      <button class="subgroup-chip ${activeSubGroupId == sg.id ? 'active' : ''}" 
              data-subgroup-id="${sg.id}" onclick="selectSubGroup(${sg.id})">
        ${escapeHtml(sg.name)}
        <span style="opacity:0.5; margin-left:3px;">${sg.task_count || 0}</span>
      </button>
    `;
  }

  html += `<button class="subgroup-chip add-subgroup-btn" onclick="openAddSubGroup()" title="Add sub-group">+</button>`;
  container.innerHTML = html;
}


// ── Select SubGroup ──
function selectSubGroup(sgId) {
  activeSubGroupId = sgId;
  renderSubGroupFilters();
  renderFilteredTasks();
}


// ── Filter by Status ──
function filterTaskStatus(status) {
  activeStatusFilter = status;
  document.querySelectorAll('.status-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === status);
  });
  renderFilteredTasks();
}


// ── Load Tasks (updated) ──
async function loadTasks() {
  try {
    const res = await fetch('/api/v1/tasks', {
      headers: { 'Authorization': `Bearer ${sessionToken}` }
    });
    if (!res.ok) throw new Error('Failed to load tasks');
    const data = await res.json();
    allTasks = data.tasks || data || [];
    renderGroupTabs();  // Update counts
    renderFilteredTasks();
  } catch (err) {
    console.error('loadTasks error:', err);
    document.getElementById('task-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load tasks</div></div>';
  }
}


// ── Filter & Render ──
function renderFilteredTasks() {
  let filtered = [...allTasks];

  // Filter by group
  if (activeGroupId === 'ungrouped') {
    filtered = filtered.filter(t => !t.group_id);
  } else if (activeGroupId !== 'all') {
    filtered = filtered.filter(t => t.group_id == activeGroupId);
  }

  // Filter by subgroup
  if (activeSubGroupId !== 'all') {
    filtered = filtered.filter(t => t.subgroup_id == activeSubGroupId);
  }

  // Filter by status
  if (activeStatusFilter !== 'all') {
    filtered = filtered.filter(t => t.status === activeStatusFilter);
  }

  renderTasks(filtered);
}


// ── Render Task List (updated with group badges) ──
function renderTasks(tasks) {
  const container = document.getElementById('task-list');

  if (!tasks || tasks.length === 0) {
    const msg = activeGroupId === 'all' ? 'No tasks yet' : 'No tasks in this group';
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">${msg}</div>
        <div class="empty-hint">Click "+ New Task" to create one</div>
      </div>
    `;
    return;
  }

  container.innerHTML = tasks.map(t => {
    const priority = (t.priority || 'medium').toLowerCase();
    const status = t.status || 'todo';
    const groupBadge = getGroupBadge(t);
    const dueBadge = getDueBadge(t);

    return `
      <div class="task-card" data-task-id="${t.id}">
        <div class="priority-bar ${priority}"></div>
        <div class="task-info">
          <div class="task-title">${escapeHtml(t.title)}</div>
          <div class="task-meta">
            <span>${escapeHtml(t.assignee_name || t.creator_name || 'Unassigned')}</span>
            ${groupBadge}
            ${dueBadge}
          </div>
        </div>
        <div class="task-actions">
          <span class="priority-badge ${priority}">${priority}</span>
          <select class="task-status-select" onchange="updateTaskStatus(${t.id}, this.value)">
            <option value="todo" ${status === 'todo' ? 'selected' : ''}>To Do</option>
            <option value="active" ${status === 'active' ? 'selected' : ''}>Active</option>
            <option value="review" ${status === 'review' ? 'selected' : ''}>Review</option>
            <option value="done" ${status === 'done' ? 'selected' : ''}>Done</option>
          </select>
          <button class="task-move-btn" onclick="openAssignModal(${t.id})" title="Move to group">📂</button>
        </div>
      </div>
    `;
  }).join('');
}


// ── Group Badge for Task ──
function getGroupBadge(task) {
  if (!task.group_id) return '';

  const group = taskGroups.find(g => g.id === task.group_id);
  if (!group) return '';

  let label = group.icon + ' ' + group.name;
  if (task.subgroup_id && group.subgroups) {
    const sg = group.subgroups.find(s => s.id === task.subgroup_id);
    if (sg) label += ' › ' + sg.name;
  }

  return `<span class="group-badge" onclick="event.stopPropagation(); selectGroupTab(${group.id})" title="View group">${escapeHtml(label)}</span>`;
}


// ── Due Date Badge ──
function getDueBadge(task) {
  if (!task.due_date) return '';
  const now = new Date();
  const due = new Date(task.due_date);
  const diffDays = Math.ceil((due - now) / (1000 * 60 * 60 * 24));

  if (task.status === 'done') return '';
  if (diffDays < 0) return `<span style="color:#f87171; font-size:0.72rem;">⏰ Overdue</span>`;
  if (diffDays === 0) return `<span style="color:#facc15; font-size:0.72rem;">⏰ Today</span>`;
  if (diffDays <= 3) return `<span style="color:#fb923c; font-size:0.72rem;">⏰ ${diffDays}d</span>`;
  return '';
}


// ── Update Task Status ──
async function updateTaskStatus(taskId, newStatus) {
  try {
    await fetch(`/api/v1/tasks/${taskId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${sessionToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ status: newStatus })
    });
    // Update local state
    const task = allTasks.find(t => t.id === taskId);
    if (task) task.status = newStatus;
    renderFilteredTasks();
  } catch (err) {
    console.error('updateTaskStatus error:', err);
  }
}


// ═══════════════════════════════════════════════════════════
// GROUP MANAGER
// ═══════════════════════════════════════════════════════════

function openGroupManager() {
  document.getElementById('group-manager-modal').style.display = 'flex';
  renderGroupManagerList();
}

function closeGroupManager() {
  document.getElementById('group-manager-modal').style.display = 'none';
}

function renderGroupManagerList() {
  const container = document.getElementById('gm-groups-list');

  if (taskGroups.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="padding:24px;">
        <div class="empty-icon">📁</div>
        <div class="empty-text">No groups yet</div>
        <div class="empty-hint">Create your first group above to organize tasks</div>
      </div>
    `;
    return;
  }

  container.innerHTML = taskGroups.map(g => `
    <div class="gm-group-card">
      <div class="gm-group-header">
        <span class="gm-group-icon">${g.icon || '📁'}</span>
        <span class="gm-group-name">${escapeHtml(g.name)}</span>
        <span class="gm-group-count">${g.task_count || 0} tasks</span>
        <div class="gm-group-actions">
          <button onclick="editGroupName(${g.id}, '${escapeHtml(g.name)}')" title="Edit">✏️</button>
          <button class="delete-btn" onclick="deleteGroup(${g.id}, '${escapeHtml(g.name)}')" title="Delete">🗑️</button>
        </div>
      </div>
      <div class="gm-subgroups">
        ${(g.subgroups || []).map(sg => `
          <div class="gm-subgroup-item">
            <span class="sg-name">${escapeHtml(sg.name)}</span>
            <span class="sg-count">${sg.task_count || 0}</span>
            <button onclick="deleteSubGroup(${sg.id}, '${escapeHtml(sg.name)}')" title="Delete">✕</button>
          </div>
        `).join('')}
        <div class="gm-add-subgroup">
          <input type="text" placeholder="New sub-group..." id="gm-sg-input-${g.id}" 
                 onkeydown="if(event.key==='Enter')addSubGroupInManager(${g.id})" />
          <button class="btn-primary btn-sm" onclick="addSubGroupInManager(${g.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}


// ── Create Group ──
async function createGroupFromManager() {
  const name = document.getElementById('gm-new-group-name').value.trim();
  if (!name) return;

  const icon = document.getElementById('gm-new-group-icon').value.trim() || '📁';
  const color = document.getElementById('gm-new-group-color').value;

  try {
    const res = await fetch('/api/v1/task-groups', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${sessionToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name, icon, color })
    });
    if (!res.ok) throw new Error('Failed to create group');

    document.getElementById('gm-new-group-name').value = '';
    document.getElementById('gm-new-group-icon').value = '';
    await loadTaskGroups();
    renderGroupManagerList();
  } catch (err) {
    console.error('createGroup error:', err);
    alert('Failed to create group');
  }
}


// ── Edit Group Name ──
async function editGroupName(groupId, currentName) {
  const newName = prompt('Rename group:', currentName);
  if (!newName || newName === currentName) return;

  try {
    await fetch(`/api/v1/task-groups/${groupId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${sessionToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name: newName })
    });
    await loadTaskGroups();
    renderGroupManagerList();
  } catch (err) {
    console.error('editGroupName error:', err);
  }
}


// ── Delete Group ──
async function deleteGroup(groupId, name) {
  if (!confirm(`Delete group "${name}"? Tasks will become ungrouped.`)) return;

  try {
    await fetch(`/api/v1/task-groups/${groupId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${sessionToken}` }
    });

    if (activeGroupId == groupId) activeGroupId = 'all';
    await loadTaskGroups();
    await loadTasks();
    renderGroupManagerList();
  } catch (err) {
    console.error('deleteGroup error:', err);
  }
}


// ── Add SubGroup from Manager ──
async function addSubGroupInManager(groupId) {
  const input = document.getElementById(`gm-sg-input-${groupId}`);
  const name = input.value.trim();
  if (!name) return;

  try {
    await fetch('/api/v1/task-groups/subgroups', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${sessionToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name, group_id: groupId })
    });

    input.value = '';
    await loadTaskGroups();
    renderGroupManagerList();
  } catch (err) {
    console.error('addSubGroup error:', err);
  }
}


// ── Delete SubGroup ──
async function deleteSubGroup(sgId, name) {
  if (!confirm(`Delete sub-group "${name}"?`)) return;

  try {
    await fetch(`/api/v1/task-groups/subgroups/${sgId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${sessionToken}` }
    });
    await loadTaskGroups();
    renderGroupManagerList();
  } catch (err) {
    console.error('deleteSubGroup error:', err);
  }
}


// ═══════════════════════════════════════════════════════════
// ADD SUBGROUP MODAL (from the filter chips)
// ═══════════════════════════════════════════════════════════

function openAddSubGroup() {
  if (activeGroupId === 'all' || activeGroupId === 'ungrouped') return;
  document.getElementById('sg-new-name').value = '';
  document.getElementById('subgroup-add-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('sg-new-name').focus(), 100);
}

function closeAddSubGroup() {
  document.getElementById('subgroup-add-modal').style.display = 'none';
}

async function createSubGroupFromModal() {
  const name = document.getElementById('sg-new-name').value.trim();
  if (!name) return;

  try {
    await fetch('/api/v1/task-groups/subgroups', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${sessionToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name, group_id: activeGroupId })
    });

    closeAddSubGroup();
    await loadTaskGroups();
  } catch (err) {
    console.error('createSubGroup error:', err);
  }
}


// ═══════════════════════════════════════════════════════════
// ASSIGN TASK TO GROUP MODAL
// ═══════════════════════════════════════════════════════════

let assigningTaskId = null;

function openAssignModal(taskId) {
  assigningTaskId = taskId;
  const task = allTasks.find(t => t.id === taskId);

  // Populate group select
  const groupSelect = document.getElementById('assign-group-select');
  groupSelect.innerHTML = '<option value="">— Ungrouped —</option>' +
    taskGroups.map(g => `<option value="${g.id}" ${task && task.group_id == g.id ? 'selected' : ''}>${g.icon} ${escapeHtml(g.name)}</option>`).join('');

  onAssignGroupChange();  // populate subgroups

  // Pre-select subgroup
  if (task && task.subgroup_id) {
    const sgSelect = document.getElementById('assign-subgroup-select');
    sgSelect.value = task.subgroup_id;
  }

  document.getElementById('assign-group-modal').style.display = 'flex';
}

function closeAssignModal() {
  document.getElementById('assign-group-modal').style.display = 'none';
  assigningTaskId = null;
}

function onAssignGroupChange() {
  const groupId = document.getElementById('assign-group-select').value;
  const sgSelect = document.getElementById('assign-subgroup-select');

  if (!groupId) {
    sgSelect.style.display = 'none';
    return;
  }

  const group = taskGroups.find(g => g.id == groupId);
  if (!group || !group.subgroups || group.subgroups.length === 0) {
    sgSelect.style.display = 'none';
    return;
  }

  sgSelect.style.display = 'block';
  sgSelect.innerHTML = '<option value="">— No Sub-group —</option>' +
    group.subgroups.map(sg => `<option value="${sg.id}">${escapeHtml(sg.name)}</option>`).join('');
}

async function confirmAssignGroup() {
  if (!assigningTaskId) return;

  const groupId = document.getElementById('assign-group-select').value || null;
  const subgroupId = document.getElementById('assign-subgroup-select').value || null;

  try {
    await fetch(`/api/v1/task-groups/tasks/${assigningTaskId}/assign`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${sessionToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        group_id: groupId ? parseInt(groupId) : null,
        subgroup_id: subgroupId ? parseInt(subgroupId) : null
      })
    });

    // Update local state
    const task = allTasks.find(t => t.id === assigningTaskId);
    if (task) {
      task.group_id = groupId ? parseInt(groupId) : null;
      task.subgroup_id = subgroupId ? parseInt(subgroupId) : null;
    }

    closeAssignModal();
    await loadTaskGroups();
    renderFilteredTasks();
  } catch (err) {
    console.error('confirmAssignGroup error:', err);
    alert('Failed to move task');
  }
}


// ── Also update New Task Modal to include group selection ──
// Add this to your existing openNewTaskModal() function:
function injectGroupSelectIntoNewTaskModal() {
  // If you have a new-task modal, add group/subgroup selectors into it.
  // This function should be called after taskGroups are loaded.
  const existingGroupField = document.getElementById('new-task-group-select');
  if (existingGroupField) return; // Already injected

  // Find the modal form — adjust selector to match your existing modal
  const modalForm = document.querySelector('#new-task-modal .modal-body') ||
                    document.querySelector('#task-modal .modal-body');
  if (!modalForm) return;

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'margin-top:12px; display:flex; gap:8px;';
  wrapper.innerHTML = `
    <div style="flex:1;">
      <label style="font-size:0.78rem; color:#94a3b8; margin-bottom:4px; display:block;">Group</label>
      <select id="new-task-group-select" class="gm-select" onchange="onNewTaskGroupChange()">
        <option value="">— None —</option>
        ${taskGroups.map(g => `<option value="${g.id}">${g.icon} ${g.name}</option>`).join('')}
      </select>
    </div>
    <div style="flex:1;">
      <label style="font-size:0.78rem; color:#94a3b8; margin-bottom:4px; display:block;">Sub-group</label>
      <select id="new-task-subgroup-select" class="gm-select">
        <option value="">— None —</option>
      </select>
    </div>
  `;
  modalForm.appendChild(wrapper);
}

function onNewTaskGroupChange() {
  const groupId = document.getElementById('new-task-group-select').value;
  const sgSelect = document.getElementById('new-task-subgroup-select');
  sgSelect.innerHTML = '<option value="">— None —</option>';

  if (!groupId) return;
  const group = taskGroups.find(g => g.id == groupId);
  if (group && group.subgroups) {
    sgSelect.innerHTML += group.subgroups.map(sg =>
      `<option value="${sg.id}">${sg.name}</option>`
    ).join('');
  }
}


// ── Utility ──
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}


// ═══════════════════════════════════════════════════════════
// INITIALIZATION — Call these when Tasks page loads
// ═══════════════════════════════════════════════════════════
// In your page router, when switching to the tasks page:
//   loadTaskGroups();
//   loadTasks();
//
// This replaces the old single loadTasks() call.
</script>
